name: verify-strict

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  verify-strict:
    name: Verify Core + Strict Readiness (Sequential)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # IMPORTANT:
    # - Strict readiness MUST run sequentially.
    # - Do NOT run this job with matrix strategy.
    # - Do NOT run concurrent truth/canonical mutation in parallel.
    # - This job must fail immediately when strict readiness fails.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Verify core
        run: npm run verify:core

      - name: Verify production readiness (strict)
        run: npm run verify:production-readiness:strict
