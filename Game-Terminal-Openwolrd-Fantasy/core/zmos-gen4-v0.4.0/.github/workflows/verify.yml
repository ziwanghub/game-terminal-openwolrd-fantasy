name: Verify

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Show version under test
        run: |
          echo "Package version: v$(node -p "require('./package.json').version")"
          node -e "const fs=require('fs');const t=fs.readFileSync('./sdk/version.ts','utf8');const m=t.match(/FULL_VERSION\\s*=\\s*\"([^\"]+)\"/);console.log('Testing version:', m?m[1]:'unknown');"

      - name: Run npm test
        run: npm test
