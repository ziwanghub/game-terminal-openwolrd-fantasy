# Rarity / grade tiers — equipment, companions (beasts/gods/etc.), drops
# Stat mult applied to base atk/hp/mana (and companion bonuses).
# Higher tiers rarer when rolling drops/recruits.

default: common

tiers:
  - id: common
    name: ธรรมดา
    rank: 1
    color_tag: "○"
    stat_mult: 1.0
    price_mult: 1.0
    upgrade_bonus: 0          # extra success chance soft (hidden)
    drop_weight: 50
    recruit_weight: 40

  - id: uncommon
    name: สูง
    rank: 2
    color_tag: "◇"
    stat_mult: 1.15
    price_mult: 1.35
    upgrade_bonus: 0.02
    drop_weight: 28
    recruit_weight: 28

  - id: rare
    name: หายาก
    rank: 3
    color_tag: "◆"
    stat_mult: 1.35
    price_mult: 2.0
    upgrade_bonus: 0.03
    drop_weight: 14
    recruit_weight: 16

  - id: sacred
    name: ศักดิ์สิทธิ์
    rank: 4
    color_tag: "★"
    stat_mult: 1.55
    price_mult: 3.2
    upgrade_bonus: 0.04
    drop_weight: 6
    recruit_weight: 8

  - id: legendary
    name: ตำนาน
    rank: 5
    color_tag: "✦"
    stat_mult: 1.85
    price_mult: 5.0
    upgrade_bonus: 0.05
    drop_weight: 3
    recruit_weight: 5

  - id: divine
    name: เทพ
    rank: 6
    color_tag: "✧"
    stat_mult: 2.2
    price_mult: 8.0
    upgrade_bonus: 0.06
    drop_weight: 1.2
    recruit_weight: 2.5

  - id: archdivine
    name: มหาเทพ
    rank: 7
    color_tag: "✪"
    stat_mult: 2.75
    price_mult: 14.0
    upgrade_bonus: 0.08
    drop_weight: 0.35
    recruit_weight: 0.8

  - id: mythic
    name: ปฐมกาล
    rank: 8
    color_tag: "◈"
    stat_mult: 3.4
    price_mult: 25.0
    upgrade_bonus: 0.1
    drop_weight: 0.08
    recruit_weight: 0.25

# Enemy (monster/boss) extra mults on top of stat_mult for threat feel
enemy_threat_mult:
  common: 1.0
  uncommon: 1.08
  rare: 1.18
  sacred: 1.28
  legendary: 1.4
  divine: 1.55
  archdivine: 1.75
  mythic: 2.0

# XP mult bonus by enemy rarity
enemy_xp_mult:
  common: 1.0
  uncommon: 1.1
  rare: 1.25
  sacred: 1.4
  legendary: 1.6
  divine: 1.85
  archdivine: 2.2
  mythic: 2.6

# Soft bias by entity kind when rolling rarity (companions)
kind_rarity_bias:
  player: {common: 1.2, uncommon: 1.1, rare: 1.0}
  spirit: {common: 1.0, uncommon: 1.1, rare: 1.15, sacred: 1.1}
  beast: {common: 1.1, uncommon: 1.2, rare: 1.0}
  heaven_beast: {sacred: 1.3, legendary: 1.2, rare: 1.1}
  hell_beast: {rare: 1.2, sacred: 1.15, legendary: 1.1}
  heaven_god: {sacred: 1.2, legendary: 1.4, divine: 1.5, archdivine: 1.3}
  hell_god: {rare: 1.1, legendary: 1.3, divine: 1.4, archdivine: 1.2}
  other: {uncommon: 1.0, rare: 1.2, legendary: 1.1}

# Item category default when not set on item
item_kind_default:
  equipment: common
  consumable: common
  material: common
  card: uncommon

# Economy: sell tax (fraction of pre-tax sell value withheld) by rarity
# Higher grade goods attract higher "tax" when fencing
sell_tax_rate:
  common: 0.0
  uncommon: 0.05
  rare: 0.10
  sacred: 0.15
  legendary: 0.22
  divine: 0.28
  archdivine: 0.35
  mythic: 0.40

# Price insurance (ประกันราคา): minimum payout as fraction of buy-price
# Shop will never pay less than floor * buy after tax consideration
price_insurance_floor:
  common: 0.25
  uncommon: 0.28
  rare: 0.30
  sacred: 0.32
  legendary: 0.35
  divine: 0.38
  archdivine: 0.40
  mythic: 0.42

# Default sell ratio before tax (shop pays this * buy price)
default_sell_ratio: 0.40
