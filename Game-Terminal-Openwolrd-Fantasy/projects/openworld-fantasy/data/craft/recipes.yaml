# Craft recipes — inputs_rarity: min grade per material (optional)
# output_rarity: forced output grade; else inherits from requirements

- id: craft_steel_blade
  name: หลอมดาบเหล็กกล้า
  station: forge
  inputs:
    iron_sword: 1
    upgrade_mat: 3
    rare_mat: 1
  inputs_rarity:
    iron_sword: uncommon   # ต้องการดาบอย่างน้อยระดับ「สูง」
    upgrade_mat: common
    rare_mat: common
  money: 120
  output: steel_blade
  output_rarity: uncommon
  unlock_level: 4

