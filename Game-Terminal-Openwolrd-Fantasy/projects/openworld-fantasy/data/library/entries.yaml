# Library knowledge pool — player never picks which entry they get.
# Access to library itself is gated (see library/access.yaml)

- id: lore_stat_soft
  title: บันทึกนักเดินทาง — "ตัวเลขไม่ใช่ทั้งหมด"
  body: |
    บางคนทุ่มโจมตีแล้วแข็งแกร่งเกินคาด
    บางคนทุ่มเหมือนกันแต่ได้ผลน้อย
    เหมือนมี "น้ำหนักซ่อน" ตามเส้นทางชีวิต...
  tags: [stats, latent]

- id: lore_warrior_hint
  title: แผ่นจารึกเหล็ก
  body: |
    นักรบที่ฝึกเกราะและดาบคู่กัน มักถูกเรียกว่า "เหล็ก"
    ผู้เห็นเงื่อนไขเต็มยังไม่มี — มีเพียงคำว่า เลเวลสองหลัก และเลือดศัตรูมากมาย
  tags: [rank, warrior]

- id: lore_mage_hint
  title: หน้ากระดาษไหม้
  body: |
    นักเรียนเวทย์ที่ปล่อยสกิลเรียงกันบ่อย
    บางครั้งได้ยินเสียง "อาร์เคน" ในหัว
  tags: [rank, mage]

- id: lore_combo
  title: ตำราคอมโบขาด
  body: |
    น้ำแล้วลม... บางครั้งหนาวจัด
    สายฟ้าใส่น้ำแข็ง... แตกง่าย
    อย่าท่องสูตร — จำความรู้สึก
  tags: [combat, element]

- id: lore_defense
  title: บันทึกผู้รอด
  body: |
    ไฟมากลืนด้วยน้ำ
    สายฟ้ามาก... อย่าใช้น้ำ
    ผิดทาง เกือบตาย
  tags: [combat, defense]

- id: lore_library_gate
  title: เงื่อนไขห้องสมุด (ฉบับเลือน)
  body: |
    ประตูเปิดเมื่อ "รู้พอ" และ "รอดพอ"
    บางคนว่า ต้องมีบันทึกปฏิกิริยา
    บางคนว่า ต้องฆ่าสิ่งใหญ่
  tags: [library]

- id: lore_unit_whisper
  title: เสียงกระซิบ Unit
  body: |
    มีอาชีพที่ไม่ใช่อาชีพ
    ได้เพียงหนึ่ง — สกิลหนึ่ง
    ไม่มีป้าย ไม่มีคำสอน เพียงเงื่อนไขที่ไม่มีใครเขียนครบ
  tags: [unit]

- id: lore_crit_speed
  title: สมุดนักธนู
  body: |
    ความเร็วกับคริติคอลของสายลม
    เหมือนเสริมกันแบบมองไม่เห็นตัวคูณ
  tags: [archer, stats]

- id: lore_death
  title: คำเตือนจากสุสาน
  body: |
    ตายแล้วยังลุกได้ แต่กระเป๋าและประสบการณ์บางส่วนหาย
    อย่าประมาท
  tags: [system]

- id: lore_heaven_hell
  title: บัญชีสองด้าน
  body: |
    เงินโลกซื้อของตลาด
    สวรรค์กับนรก... ร้านคนละที่
  tags: [economy]
