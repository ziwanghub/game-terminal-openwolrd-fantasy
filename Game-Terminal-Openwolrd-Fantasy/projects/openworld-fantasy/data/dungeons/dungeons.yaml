# Dungeons per area — difficulty numbers HIDDEN from player.
# soft_label only appears after enough knowledge (visits/clears/library).

appear_chance: 0.18
# base chance each field tick to show a dungeon mouth in sights

# Time limit: each dungeon action (explore/advance/boss try/escape fail) spends 1 turn
# Numbers hidden — player only feels pressure messages
time_limit:
  base_turns: 14
  per_floor: 4
  per_difficulty: 2
  # when remaining turns low, soft pressure; at 0 force collapse eject
  warn_at: 5
  critical_at: 2

# Random floor layout tags (soft map) + event weights when exploring
floor_layouts:
  - id: winding
    label: ทางคดเคี้ยว
  - id: chamber
    label: ห้องโถงกว้าง
  - id: choke
    label: ทางแคบอับ
  - id: collapse
    label: ซากถล่ม
  - id: shrine
    label: แท่นบูชาเลือน
  - id: pool
    label: แอ่งน้ำดำ
  - id: crystal
    label: โถงผลึก
  - id: void
    label: ช่องว่างไร้ทิศ

floor_events:
  - id: ambush
    weight: 35
    kind: combat
    flavor: เงาพุ่งจากมุมมืด!
  - id: patrol
    weight: 20
    kind: combat
    flavor: กลุ่มศัตรูลาดตระเวนตัดทาง
  - id: empty
    weight: 15
    kind: empty
    flavor: เงียบ — ได้แต่จดจำเส้นทาง
  - id: cache
    weight: 12
    kind: loot
    flavor: พบซากกระเป๋า/หีบเก่า
  - id: rest_nook
    weight: 8
    kind: rest
    flavor: มุมปลอดภัยครู่หนึ่ง — หายใจได้
  - id: trap
    weight: 10
    kind: trap
    flavor: กับดัก! พื้น/ลูกดอก/พิษ
  - id: omen
    weight: 8
    kind: omen
    flavor: สัญญาณอันตรายกระตุก — ความรู้สะสม

# Default clear rewards if dungeon has no custom rewards block
default_rewards:
  money_world: [40, 90]
  xp: [25, 60]
  items:
    - id: upgrade_mat
      chance: 0.55
      rarity: uncommon
    - id: rare_mat
      chance: 0.22
      rarity: rare
    - id: dungeon_thread
      chance: 0.08
      rarity: rare

escape:
  # items that MAY allow exit if already in inventory when entering (not taught in UI)
  items:
    - id: dungeon_thread
      success_chance: 0.55
    - id: void_key_shard
      success_chance: 0.75
    - id: blessed_charm
      success_chance: 0.35   # sacred charm can sometimes pull you out
  # failed escape / forced leave drains
  drain_money_pct: 0.12
  drain_item_chance: 0.4
  drain_max_items: 2

knowledge:
  # visits needed before soft difficulty word appears
  soft_label_visits: 2
  # clears needed for more accurate tone
  accurate_after_clears: 1

dungeons:
  - id: dung_forest_root
    name: รากป่ารูปเขี้ยว
