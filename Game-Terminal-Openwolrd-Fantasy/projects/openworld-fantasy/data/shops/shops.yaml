# Shop stock policy (1.14 + 1.24 + WO-Shop-1/2):
#   - ร้านระบบ = ของใช้ทั่วไป หาซื้อง่าย (common–uncommon เป็นหลัก)
#   - เกียร์ rare+ / sacred+ / unit / หีบ / key ซ่อน = ไม่ขายในร้านระบบ (ยกเว้น legend เบา)
#   - การ์ด (card_*) = ไม่ขายในร้านระบบ · ได้จากการดรอปไฟต์/บอสเท่านั้น
# WO-Shop-2 identity:
#   traveling_merchant = ยา/อาหาร/เดินทาง
#   city_armory        = เกียร์ + วัตถุดิบอัปเกรด
#   rare_exchange      = mat + scroll + crystal
#   celestial_bazaar   = charm / blessing
#   infernal_market    = hell contract / void ash
#   legend_pavilion    = รับซื้อ rank สูง + stock legend เบา
#
# stock: string id OR {id, rarity}
# tone: soft UI hint (ไม่โชว์ %)
# mat_sell_cap — เพดาน sell ratio วัตถุดิบ (≤0.34)

- id: traveling_merchant
  name: พ่อค้าเร่
  tone: รถเร่ริมทาง — ยา อาหาร เสบียงเดินทาง
  specialty_hint: ที่นี่เด่นเรื่องยา·เสบียงเดินทาง
  greetings:
  - 「ลุยทางไกลมานาน — ของใช้ครบในรถเร่」
  - 「ยา เสบียง น้ำชา… เลือกได้ แล้วไปต่อทาง」
  - 「ถนนยังอีกยาว ของพกติดตัวไว้ดีกว่า」
  buy_bias: -0.01
  sell_bias: 0.0
  min_rarity_rank: 1
  max_rarity_rank: 3
  stock:
    - potion_hp_small
    - potion_hp
    - potion_mana
    - antidote
    - balm_regen
    - balm_nature
    - tea_focus
    - oil_ward
    - tonic_might
    - forest_charm
    - city_bread
    - travel_pass_city
    - repair_kit_basic
    - incense_focus_bulk
    - hunter_ration
    - traveler_ration
    - trail_stew
    - shop_merchant_road_tea
    - shop_merchant_mixed_ration
    - herb_bundle
    - upgrade_mat
    - iron_arrowhead
    - id: scroll_guard_level
      rarity: common
    - id: iron_sword
      rarity: common
    - id: leather_armor
      rarity: common
    - id: copper_ring
      rarity: common
    - id: dune_sandals
      rarity: common

- id: city_armory
  name: ร้านอาวุธเมือง
  tone: โรงตีเมือง — อาวุธ เกราะ และวัสดุอัปเกรด
  specialty_hint: ที่นี่เด่นเรื่องเกียร์เหล็กและวัสดุอัป
  greetings:
  - 「ที่นี่เด่นเรื่องเกียร์เหล็ก — ลับคม ซ่อมเกราะ」
  - 「เสียงทั่งดัง — หาอาวุธและวัสดุอัปที่นี่」
  - 「คมดีกว่ามัว — เลือกลองถือก่อนซื้อ」
  buy_bias: 0.015
  sell_bias: 0.01
  min_rarity_rank: 1
  max_rarity_rank: 3
  # WO-Shop-2: เกียร์ + วัตถุดิบอัป (ไม่ขายยา/อาหาร)
  stock:
