# Shop stock policy (1.14 + 1.24 economy):
#   - ร้านระบบ = ของใช้ทั่วไป หาซื้อง่าย (common–uncommon เป็นหลัก)
#   - เกียร์ rare+ / sacred+ / unit / หีบ / key ซ่อน = ไม่ขายในร้านระบบ
#     → ดรอปจาก open world / หีบ / เควส แล้วขายตลาดผู้เล่น (ตั้งราคาเอง · ภาษีตามราคา)
#   - การ์ด (card_*) = ไม่ขายในร้านระบบ · ได้จากการดรอปไฟต์/บอสเท่านั้น
# Specialty markets (สวรรค์/นรก) = sink สกุลเงินพิเศษ + ของใช้ ไม่ขายเกียร์ตำนาน/การ์ด
#
# stock: string id OR {id, rarity}
# min_rarity_rank / max_rarity_rank — เกรดที่ร้านรับซื้อ/โชว์ (1=common … 8=mythic)

- id: traveling_merchant
  name: พ่อค้าเร่
  min_rarity_rank: 1
  max_rarity_rank: 3
  stock:
    # ยาทั่วไป
    - potion_hp_small
    - potion_hp
    - potion_mana
    - antidote
    - balm_regen
    - balm_nature
    - tea_focus
    - oil_ward
    - tonic_might
    - forest_charm
    # อาหาร (needs)
    - city_bread
    - travel_pass_city
    - repair_kit_basic
    - incense_focus_bulk
    - hunter_ration
    - traveler_ration
    - trail_stew
    # วัสดุเล็ก
    - iron_arrowhead
    - herb_bundle
    - upgrade_mat
    - forest_moss
    - marsh_slime
    - bird_quill
    - chitin_plate_mat
    - id: scroll_guard_level
      rarity: common
    - id: scroll_guard_break
      rarity: common
    # เกียร์ต้นทาง
    - id: iron_sword
      rarity: common
    - id: bandit_knife
      rarity: common
    - id: leather_armor
      rarity: common
    - id: copper_ring
      rarity: common
    - id: bone_dagger
      rarity: common
    - id: dune_sandals
      rarity: common

