# ศาลาตำนาน = รับซื้อ rank สูง + stock legend เบา (WO-Shop-2 · ไม่ Divine dump)
- id: legend_pavilion
  name: ศาลาตำนาน
  tone: ศาลาเงียบ — รับซื้อของแรงก์สูง · วางขายตำนานเบา
  specialty_hint: ที่นี่รับซื้อแรงก์สูง · stock ตำนานเบา
  greetings:
  - 「ศาลาเงียบ — รับซื้อของแรงก์สูง · ตำนานเบา」
  - 「ของตำนานวางน้อย — ส่วนใหญ่รับซื้อ」
  - 「เสียงก้องแผ่ว… ดู stock เบา แล้วค่อยขายของแรง」
  buy_bias: 0.02
  sell_bias: 0.01
  min_rarity_rank: 5
  max_rarity_rank: 8
  sell_ratio: 0.36
  price_insurance_floor: 0.28
  sell_tax_bonus: 0.10
  mat_sell_cap: 0.30
  buy_stock: true
  stock:
    # light showcase always visible (rep still affects price; not Divine dump)
    - id: shop_legend_memory_fragment
      rarity: legendary
      always_show: true
    - id: shop_legend_soft_seal
      rarity: legendary
      always_show: true
    - id: shop_legend_echo_thread
      rarity: legendary
      always_show: true
