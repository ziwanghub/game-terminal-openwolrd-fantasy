- id: celestial_bazaar
  name: ตลาดสวรรค์
  min_rarity_rank: 1
  max_rarity_rank: 4
  sell_ratio: 0.42
  price_insurance_floor: 0.34
  sell_tax_bonus: -0.03   # slightly lower tax (heaven favor)
  stock:
    # sink เงินสวรรค์ + ของใช้ — ไม่ขายเกียร์ตำนาน
    - id: blessed_charm
      rarity: sacred
    - spirit_incense
    - potion_mana
    - focus_tea
    - mind_elixir
    - traveler_ration
    - trail_stew
    - inn_feast

- id: infernal_market
  name: ตลาดนรก
  min_rarity_rank: 1
  max_rarity_rank: 4
  sell_ratio: 0.45
  sell_tax_bonus: 0.05    # higher tax (infernal cut)
  stock:
    # sink เงินนรก + ของใช้ — ไม่ขายเกียร์ตำนาน/เงา high
    - id: hell_contract
      rarity: rare
    - void_ash
    - tonic_might
    - oil_ward

# รับซื้อ/แลกวัสดุกลาง — ไม่ขายเกียร์ rare+ จากระบบ
- id: rare_exchange
  name: ตลาดวัสดุหายาก
  min_rarity_rank: 2
  max_rarity_rank: 4
  sell_ratio: 0.44
  price_insurance_floor: 0.33
  stock:
    - upgrade_mat
    - id: rare_mat
      rarity: uncommon
    # ม้วนกัน — หลาย rank (ต้อง rank ≥ ชิ้นเกียร์)
    - id: scroll_guard_level
      rarity: common
    - id: scroll_guard_level
      rarity: uncommon
    - id: scroll_guard_level
      rarity: rare
    - id: scroll_guard_break
      rarity: common
    - id: scroll_guard_break
      rarity: uncommon
    - id: scroll_guard_break
      rarity: rare
    - id: scroll_guard_break
      rarity: sacred
    - crystal_dust
    - sand_cloak_mat
    - panacea
    - mind_elixir
    - lucid_incense
    - balm_nature
    - oil_shadow
    - bird_quill
    - chitin_plate_mat
    - plant_heart
    - undead_ash
    - void_filament
    - prism_shard
    - id: fang_charm
      rarity: uncommon
    - id: bone_circlet
      rarity: uncommon
    - id: chitin_vest
      rarity: uncommon
    - id: mid_storm_boots
      rarity: rare
    - id: mid_steel_glaive
