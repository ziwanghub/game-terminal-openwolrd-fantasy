- id: celestial_bazaar
  name: ตลาดสวรรค์
  tone: แสงบางและพรแผ่ว — เครื่องราง / blessing (เงินสวรรค์)
  specialty_hint: ที่นี่เด่นเรื่องเครื่องราง·พร (เงินสวรรค์)
  greetings:
  - 「แสงบาง — เครื่องรางและพรแผ่ว」
  - 「ไม่ขายคมดาบ — ขายความสงบและ blessing」
  - 「ลมฟ้าแผ่ว… เลือกของอุ่นใจ」
  buy_bias: 0.0
  sell_bias: 0.0
  min_rarity_rank: 1
  max_rarity_rank: 4
  sell_ratio: 0.40
  price_insurance_floor: 0.30
  sell_tax_bonus: -0.03
  mat_sell_cap: 0.32
  stock:
    - id: blessed_charm
      rarity: sacred
    - spirit_incense
    - focus_tea
    - mind_elixir
    - lucid_incense
    - shop_celestial_prayer_bead
    - shop_celestial_soft_laurel
    - shop_celestial_light_vial
    - inn_feast

- id: infernal_market
  name: ตลาดนรก
