    - id: scroll_guard_break
      rarity: rare

# ศาลาตำนาน = รับซื้อของแรงก์สูงจากผู้เล่น (max_rarity สูง) — stock ระบบว่าง
# ของตำนานต้องดรอปจากโลก แล้วตั้งราคาขายตลาดผู้เล่นเอง
- id: legend_pavilion
