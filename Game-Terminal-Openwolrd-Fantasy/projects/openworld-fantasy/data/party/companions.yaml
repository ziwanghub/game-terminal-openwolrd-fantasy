# Party companion templates — acquisition rules HIDDEN from UI.
# kind: player | spirit | beast | heaven_god | hell_god | heaven_beast | hell_beast | other

max_party_size: 3
# soft cost when calling party power in combat (hidden scale)
call_base_mana: 4
call_base_world: 0

kinds:
  - id: player
    name: ผู้เล่น
    desc: เงาผู้เดินทางจากโลกอื่น
  - id: spirit
    name: ภูต
    desc: วิญญาณบางเบา
  - id: beast
    name: สัตว์อสูร
    desc: สัตว์ป่าที่ถูกผนึก
  - id: heaven_god
    name: เทพสวรรค์
    desc: เงารัศมี — หายาก
  - id: hell_god
    name: เทพมาร
    desc: เงาโลหิต — หายาก
  - id: heaven_beast
    name: สัตว์สวรรค์
    desc: สัตว์แห่งแสง
  - id: hell_beast
    name: สัตว์นรก
    desc: สัตว์แห่งเหว
  - id: other
    name: ไม่ทราบชนิด
    desc: ...

