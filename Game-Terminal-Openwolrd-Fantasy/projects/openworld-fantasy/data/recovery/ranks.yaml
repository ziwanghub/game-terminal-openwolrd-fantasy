    duration: 5
    full: false
  D:
    amount: 30
    duration: 5
    full: false
  C:
    amount: 50
    duration: 5
    full: false
  B:
    amount: 80
    duration: 5
    full: false
  A:
    amount: 100
    duration: 5
    full: false
  S:
    amount: 0
    duration: 3
    full: true

