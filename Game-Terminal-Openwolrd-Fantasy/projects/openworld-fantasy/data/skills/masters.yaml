# Skill masters — NPC teachers with lease / renew fees

- id: master_steel
  name: อาจารย์เกราะแดง
  area_hint: ancient_city
  flavor: ชายชุดเกราะแดงพูดน้อย ยื่นมือขอค่าเรียน
  teaches:
    - skill_id: master_steel_lesson
      fee_world: 100
      fee_heaven: 0
      fee_hell: 0
      lease_uses: 10
      renew_fee_world: 60
      require_skills: [basic_strike, counter_guard]
    - skill_id: warrior_iron_tempest
      fee_world: 180
      fee_heaven: 2
      lease_uses: null
      require_skills: [warrior_whirl, iron_will]

