  - sequence: [wind, lightning]
    result_elements: [wind, lightning]
    power_bonus: 0.26
    flavor: พายุสายฟ้า!

  - sequence: [physical, wind]
    result_elements: [physical, wind]
    power_bonus: 0.15
    flavor: คมดาบลมพัด!

  - sequence: [arcane, fire]
    result_elements: [arcane, fire]
