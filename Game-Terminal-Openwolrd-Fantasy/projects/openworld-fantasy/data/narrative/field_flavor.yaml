# Field / world atmosphere — outside combat. Merged into narrative registry.

field_rest:
  - "คุณนั่งลง... ลมใน {area} พัดผ่าน กล้ามเนื้อคลาย"
  - "พักหายใจใน {area} — เสียงไกลๆ ยังดัง แต่ชั่วคราวปลอดภัย"
  - "หลังพัก ร่างกายอุ่นขึ้นเล็กน้อย ความเหนื่อยจาง"

field_explore:
  - "คุณย่างเท้าลึกเข้าไปใน {area}... ร่องรอย/กลิ่นเปลี่ยน"
  - "สำรวจ {area}: ใบไม้/หิน/ฝุ่น เล่าเรื่องที่ยังไม่ชัด"
  - "ทุกก้าวใน {area} อาจเป็นทั้งโอกาสและกับดัก"

field_explore_find:
  - "บางอย่างกระตุกที่ขอบสายตา..."
  - "พื้นสั่นเบา — มีสิ่งมีชีวิตใกล้ๆ"
  - "โชคหรือคำสาป? สิ่งนั้นปรากฏตรงหน้า"

field_explore_empty:
  - "เงียบ... ได้แต่ชำนาญเส้นทางขึ้นอีกนิด"
  - "ไม่มีอะไรโผล่ — แต่แผนที่ในหัวละเอียดขึ้น"
  - "ลมว่างเปล่า ฝีเท้าคุณแน่ขึ้นใน {area}"

field_travel:
  - "คุณออกจากที่เก่า มุ่งสู่ {area}..."
  - "ถนน/ทางลัดพาไปยัง {area} ท้องฟ้าเปลี่ยนโทน"
  - "ระยะทางกลืนกินเวลา — ปลายทางคือ {area}"

field_travel_ambush:
  - "ระหว่างทาง! เงาตัดเส้นทาง — ซุ่มโจมตี!"
  - "ฝุ่นตลบ ศัตรูโผล่กลางการเดินทาง"

field_sights:
  - "ในระยะสายตา มีสิ่งที่ดึงความสนใจ..."
  - "คุณหยุดมองรอบ — มีเป้าให้เข้าหา"
  - "{area} ไม่ว่างเปล่าวันนี้"

field_no_sights:
  - "รอบตัวว่าง — ยังไม่เห็นเป้าชัด"
  - "ลมว่าง ยังไม่มีเงาอื่นเข้าใกล้"

field_approach_npc:
  - "คุณก้าวเข้าหาคนแปลกหน้า... เขาวัดสายตาคุณ"
  - "ระยะห่างหด — ท่าทางของคุณจะตัดสินใจทุกอย่าง"

field_approach_monster:
  - "คุณเข้าใกล้สิ่งมีชีวิตนั้น หัวใจเต้นตามจังหวะอันตราย"
  - "กลิ่น/เสียงของมันชัดขึ้นทุกก้าว"
  - "ระยะหด — บางตัวไม่พุ่งทันที เหมือนรอการตอบสนอง"

field_monster_talk:
  - "เสียง/ท่าทางของมัน… คล้ายจะสื่อสารได้"
  - "วงรบยังไม่เกิด — มีช่องว่างสำหรับคำพูด"

field_monster_truce:
  - "มันถอยครึ่งก้าว — วงรบคลายโดยไม่ต้องฆ่าจบ"
  - "การเผชิญหน้าจบแบบคลุมเครือ แต่คุณยังยืนอยู่"

field_approach_player:
  - "เงาผู้เดินทางอีกคน... ไม่ใช่ NPC ธรรมดา"
  - "คุณพบผู้เล่นจากเส้นทางอื่นในโลกนี้"

field_approach_chest:
  - "หีบ/ของวางอยู่... มือของคุณชะงักครู่หนึ่ง"
  - "มันเงียบเกินไปสำหรับสมบัติธรรมดา"

field_loot:
  - "ของหล่นกระจาย — คุณต้องเลือกว่าจะแบกอะไรต่อ"
  - "ซากสนามรบทิ้งเศษไว้... มือหยิบหรือปล่อย?"

field_loot_take:
  - "คุณเก็บ {item} ใส่กระเป๋า"
  - "{item} หนักขึ้นในมือ — ตัดสินใจเก็บแล้ว"

field_loot_leave:
  - "คุณเดินจากของบางชิ้นไป... กระเป๋าหรือสติไม่อนุญาต"
  - "ปล่อยไว้ — บางอย่างไม่คุ้มแบก"

field_library:
  - "กลิ่นกระดาษและฝุ่นเก่า... ชั้นหนังสือในความมืด"
  - "ห้องสมุดเปิดรับ — แต่ความรู้ไม่เคยให้ครบในหน้าเดียว"

field_library_denied:
  - "ประตูเงียบ... ยังไม่ถึงเวลาที่คุณจะเข้า"
  - "บรรณารักษ์ (หรือเงา?) ส่ายหัว — เงื่อนไขยังไม่ครบ"

field_party_recruit:
  - "เงาเข้าใกล้: {name}... มันจ้อง รอยอมรับ?"
  - "{name} หยุดในระยะเอื้อม — การยื่นมือคือคำสัญญา"

field_party_join:
  - "✦ {name} ยอมร่วมทาง — ฝุ่นใต้เท้ามีสองจังหวะแล้ว"
  - "พันธะบางอย่างผูก — {name} เดินข้างคุณ"

field_party_reject:
  - "เงาถอย... ยังไม่ถึงเวลา (หรือคุณไม่พร้อม)"
  - "การปฏิเสธ/การไม่ยอมรับ ทำให้เส้นทางแยกอีกครั้ง"

field_party_dismiss:
  - "{name} หันหลัง — ทางของเขา/มัน เป็นของตัวเองอีกครั้ง"
  - "ปาร์ตี้เบาลงหนึ่งเงา: {name} แยกทาง"

field_shop:
  - "กลิ่นโลหะ/สมุนไพร/เครื่องเทศจากแผงร้าน"
  - "พ่อค้ายิ้มกว้าง — ราคาอาจไม่ยิ้มตาม"

field_quest_update:
  - "บางอย่างในภารกิจขยับ... คุณรู้สึกได้โดยไม่ต้องเห็นตัวเลข"
  - "เส้นทางเควสกระตุกเบาๆ ใต้ผิวความทรงจำ"

field_level_up:
  - "พลังในร่างพุ่ง — เลเวลขึ้น โลกดูคมขึ้นนิด"
  - "ขีดจำกัดเดิมแตก... คุณโตขึ้นอีกขั้น"

field_night_feel:
  - "เวลาเดิน — {area} เปลี่ยนโทนแสง"
  - "หน่วยเวลาผ่านไป ความเหนื่อยสะสมเงียบๆ"

area_mood_dark_forest:
  - "ต้นไม้สูงบังฟ้า ใบไม้กระซิบชื่อที่คุณไม่รู้จัก"
  - "รากไม้ไขว้ทางเดิน — บางเงาไม่ใช่กิ่ง"
  - "กลิ่นดินชื้นปนขนสัตว์ ป่าจำคุณได้หรือเปล่า?"
  - "WO-029: รอยเท้าเก่าของคุณยังชื้น — ป่าจำคนที่กลับมา"
  - "แสงกระพริบระหว่างลำต้น — เหมือนมีคนเฝ้าทางราก"
  - "นกเงียบผิดปกติ แล้วร้องทีเดียว — ทางข้างหน้าไม่ว่าง"
area_mood_cave_shadow:
  - "ความมืดเหนียว หยดน้ำดังในหู"
  - "ผนังถ้ำเย็น แสงจากทางเข้าเหลือแค่แถบบาง"
  - "ลมจากเหวลึกพัดขึ้น — มีสิ่งอยู่ด้านล่าง"
  - "WO-031: จุดติดตะเกียงเก่ายังมีเขม่า — ใครเคยกลับมาที่นี่"
  - "ปีกค้างคาวกระพือไกล แล้วเงียบ — ทางข้างหน้าไม่ว่าง"
  - "ผลึกฝังผนังสะท้อนตาคุณครึ่งวินาที แล้วดับ"
area_mood_desert_heat:
  - "ความร้อนแผ่จากพื้นทราย ท้องฟ้าสั่น"
  - "เนินทรายเคลื่อนช้า รอยเท้าจะหายในไม่ช้า"
  - "เงาหินเดียวคือที่พัก — แต่ก็เป็นที่ซุ่ม"
  - "WO-031: โอเอซิสจางๆ ที่ขอบตา — ใกล้แล้วหรือแค่ภาพลวง"
  - "แมงป่องตัวเล็กไถลข้ามรองเท้า แล้วจมทราย"
  - "ลมร้อนพัดฝุ่นเข้าตา — ดวงอาทิตย์ยังสูงอยู่"
area_mood_mountain_rock:
  - "ลมเขาคม หินภายใต้เท้าลื่นและจริงจัง"
  - "ยอดผาตัดขอบฟ้า เสียงนกดังจากด้านบน"
  - "ทางแคบข้างเหว — อย่ารีบ อย่าลังเลนาน"
  - "WO-032: กองไฟค่ายเก่ายังมีเถ้า — ใครเคยเฝ้าใต้ยอดผา"
  - "โกเล็มหินขยับช้า แล้วหยุด — ทางข้างหน้าไม่สงบ"
  - "เสียงนกอินทรีจากยอด แล้วเงียบ — ลมแรงขึ้น"
area_mood_ancient_city:
  - "ซากอารยธรรมเงียบ กรวดใต้รองเท้าดังก้อง"
  - "เสาหักเรียงเป็นระเบียบ ยังมีคนเดินในเงาซาก"
  - "กลิ่นตลาดจางๆ ปนฝุ่นหิน — เมืองยังหายใจ"
  - "WO-032: เสียงรองเท้าในซอย — ลาดตระเวนยังมีงาน"
  - "แผงตลาดร้างโยกตามลม — เหมือนยังมีคนขายเมื่อวาน"
  - "แสงจากร้าน/โรงตีเหล็กโผล่ครึ่งวินาที แล้วดับ"
area_mood_mist_marsh:
  - "หมอกลอยต่ำ กลิ่นน้ำขังและซากพืช"
  - "พื้นโคลนดูดฝีเท้า เสียงกบ/แมลงกลบทิศ"
  - "ผิวน้ำนิ่งผิดปกติ — มีอะไรใต้ผิว"
  - "WO-029: ทางกออ้อโผล่ครึ่งเส้น — กลับมาอีกทีอาจแห้งขึ้น"
  - "ปลิงตัวเล็กไถลข้ามรองเท้า แล้วหายในหมอก"
  - "กลิ่นยาสมุนไพรจาง ๆ — มีคนเคยตั้งค่ายที่นี่"
area_mood_crystal_peak:
  - "แสงหักเหในผลึก อากาศบางและใส"
  - "เสียงกริ่งเบาเมื่อเดิน — ผลึกตอบสนองฝีเท้า"
  - "ขอบผาผลึกคมตา อย่าล้มลงข้างทาง"
  - "WO-032: เศษผลึกใต้เท้ายังอุ่น — มีคนเก็บเมื่อกี้หรือเปล่า"
  - "แสงปริซึมกระพริบสามครั้ง — ทางยอดยังไม่ว่าง"
  - "ลมบางพัดผ่านช่องผลึก เสียงเหมือนกระซิบชื่อ"
area_mood_void_rift:
  - "ทิศทางมัว — รอยแยกกลืนทั้งเสียงและเงา"
  - "แรงดึงเบาๆ ที่หน้าอก เหมือนโลกอยากให้คุณเข้าไป"
  - "ดาว/แสงผิดที่ — กฎที่นี่ไม่เหมือนพื้นราบ"
  - "WO-032: ขอบรอยแยกมีรอยเท้ากลับ — ใครเดินแล้วหันหลัง"
  - "เสียงจากเหวดังขึ้นครึ่งจังหวะ แล้วหาย"
  - "เงาคุณยืดผิดทิศ — อย่ายืนนาน"

npc_outcome_friend:
  - "สายตานุ่มลง — ได้เพื่อนชั่วคราวบนเส้นทาง"
npc_outcome_hostile:
  - "รอยยิ้มหาย อาวุธ/เล็บโผล่ — เป็นศัตรู!"
npc_outcome_shop:
  - "เขากางผ้าใบของ — เป็นพ่อค้าพเนจร"
npc_outcome_master:
  - "แรงกดจากอาจารย์... เขาอาจสอนได้ ถ้าคุณจ่าย/พร้อม"
npc_outcome_ignore:
  - "เขาเดินผ่านไป ราวกับคุณเป็นแค่ลม"

blessing_expire:
  - "「{buff}」จาง... ร่างกายกลับสู่จังหวะเดิม"
  - "พร/บัฟหมดอายุ — ไหล่เบาลงแต่ก็เปล่าเปลี่ยวขึ้น"
