# Combat & situation narrative — create atmosphere. Player reads what is happening.
# {name} {enemy} {skill} {dmg} {heal} {status} {grade} {element} placeholders.

enabled: true
prefix: "  "

# Severity bands for damage vs max_hp ratio
damage_bands:
  scratch: 0.05      # <5%
  light: 0.12
  solid: 0.25
  heavy: 0.45
  devastating: 1.01  # else

battle_start:
  - "อากาศเปลี่ยน — สนามรบเปิดขึ้นรอบตัวคุณกับ {enemy}"
  - "สายตาประสาน... {enemy} ไม่ถอย"
  - "ลมหยุดครู่หนึ่ง แล้ว {enemy} ก็ขยับ"

battle_start_ambush:
  - "เงาพุ่งจากด้านข้าง! ยังตั้งท่าไม่ทัน — {enemy} ได้เปรียบ!"
  - "ซุ่ม! หัวใจเต้นแรง ร่างกายยังไม่พร้อมรับ {enemy}"

battle_start_boss:
  - "พื้นดินสั่น... {enemy} ยืนขวางทางราวกับเจ้าของสถานที่นี้"
  - "แรงกดดันหนักอึ้ง — นี่ไม่ใช่ศัตรูธรรมดา: {enemy}"

unknown_foe:
  - "ร่างนั้นคลุมเครือ ยังอ่านไม่ออกว่าอันตรายแค่ไหน"
  - "คุณยังไม่รู้จักสิ่งนี้ — ทุกฝีเท้าคือการเดิมพัน"

player_basic_attack:
  - "คุณก้าวเข้า ฟัน/แทงเข้าหา {enemy}"
  - "ร่างกายสั่งสมแรง แล้วปล่อยการโจมตีตรงๆ"
  - "ไม่มีเวท — แค่เจตนาคมๆ ใส่ {enemy}"

player_skill:
  - "คุณรวบมานา ปล่อย「{skill}」!"
  - "ท่า「{skill}」พุ่งออกจากปลายนิ้ว/อาวุธ"
  - "ลมหายใจสั้นลงครู่หนึ่ง — 「{skill}」ระเบิดออก"

player_combo:
  - "คุณเรียงท่าติดกัน: {skill} — ลูกโซ่พลังพาดผ่านสนาม"
  - "คอมโบ {length} ขั้น! {skill} หลอมรวมเป็นจังหวะเดียว"
  - "ฝีเท้า-มานา-เจตนาประสาน: {skill}"

player_heal:
  - "แสงอุ่นแผ่จาก「{skill}」 — บาดแผลเริ่มสมาน (+{heal})"
  - "「{skill}」ห่อหุ้มร่างกาย คุณรู้สึกเลือดคืน (+{heal})"

player_crit:
  - "จังหวะพอดี! ช่องว่างของ {enemy} เปิด — คริติคอล!"
  - "สายตาคมกริบ ทุกอย่างช้าลง... แล้วก็แตก!"

damage_out_scratch:
  - "เพียงครูดผิว {enemy} ({dmg})"
  - "สัมผัสได้ แต่ยังไม่ลึก ({dmg})"
damage_out_light:
  - "{enemy} สะดุ้ง — โดน {dmg}"
  - "แรงปะทะส่ง {enemy} ถอยก้าว ({dmg})"
damage_out_solid:
  - "กระแทกหนัก! {enemy} เสียหลัก ({dmg})"
  - "เสียงกระทบดัง — ดาเมจ {dmg} ฝังเข้าไป"
damage_out_heavy:
  - "ระเบิดแรง! {enemy} ทรุดเกือบล้ม ({dmg})"
  - "สนามสั่น — {enemy} รับ {dmg} อย่างจัง"
damage_out_devastating:
  - "พายุดาเมจกลืนกิน {enemy}! ({dmg})"
  - "ชั่วพริบตา {enemy} เกือบหายไปในแรงปะทะ ({dmg})"

element_fire:
  - "ความร้อนพวยพุ่ง ไหม้ขอบสายตา"
element_water:
  - "คลื่นเย็น/ชื้น พัดผ่านเกราะ"
element_lightning:
  - "ประกายไฟแลบ กล้ามเนื้อศัตรูเกร็ง"
element_shadow:
  - "เงากัดกร่อนราวกับมีชีวิต"
element_holy:
  - "รัศมีขาวฉาน แหวกความมืด"
element_ice:
  - "น้ำค้างแข็งเกาะตามรอยปะทะ"
element_arcane:
  - "สัญลักษณ์เวทย์ลอยวนก่อนแตก"

enemy_telegraph:
  - "{telegraph}"
  - "ท่าทาง {enemy}: {telegraph}"

damage_in_scratch:
  - "ครูดเบาๆ — คุณยังทรงตัวได้ ({dmg})"
damage_in_light:
  - "เจ็บแปลบ! รับ {dmg} จาก {enemy}"
damage_in_solid:
  - "กระแทกเข้าลำตัว — ลมหายใจสะดุด (ดาเมจ {dmg})"
damage_in_heavy:
  - "โลกหมุน! {enemy} ทุ่มแรงใส่คุณ ({dmg})"
damage_in_devastating:
  - "เกือบขาดใจ... ดาเมจ {dmg} ทุบเข้ามาไม่ยั้ง"

guard_strong:
  - "★ 「{skill}」รับจังหวะพอดี — แรงปะทะถูกกลืนเกือบหมด!"
  - "เกราะ/ม่านทำงาน! {skill} กันได้อย่างสวย ({grade})"
guard_neutral:
  - "「{skill}」รับได้บางส่วน — ยังเจ็บแต่ไหว"
  - "ป้องกันกึ่งๆ แรงยังเล็ดลอด"
guard_weak:
  - "✗ 「{skill}」ผิดจังหวะ/ผิดธาตุ — แทบไม่ช่วย!"
  - "คุณกันผิดทาง แรงของ {enemy} ทะลุเข้ามา"
guard_none:
  - "ไม่มีการ์ด — ร่างกายรับเต็มๆ"

reflect:
  - "พลังสะท้อนกลับ! คุณโดน {dmg} จากเงาสะท้อน"
  - "เหมือนตีกระจก — แรงบางส่วนย้อนใส่คุณ ({dmg})"

status_apply_enemy:
  - "「{status}」เกาะ {enemy} แน่น!"
  - "{enemy} ติดสถานะ: {status_name} — {status_feel}"
status_apply_self:
  - "คุณรู้สึกถึง「{status_name}」... {status_feel}"
  - "ร่างกายคุณ: {status_name} — {status_feel}"

status_tick_poison:
  - "พิษกัดจากภายใน (−{dmg}) ปากขม"
  - "เส้นเลือดร้อนวูบ — พิษทำงาน (−{dmg})"
status_tick_burn:
  - "เปลวเล็กๆ ยังไหม้ตามผิว (−{dmg})"
status_tick_freeze:
  - "ความเย็นล็อกกล้ามเนื้อ — ขยับยาก"
status_tick_stun:
  - "ศีรษะอื้อ — จังหวะหลุดชั่วขณะ"
  - "มึนงง! เกือบล้มก้าว"
status_tick_shock:
  - "ประกายวิ่งตามเส้นประสาท (−{dmg})"
  - "ช็อกกระตุก — กล้ามเนื้อไม่เชื่อฟัง (−{dmg})"
status_tick_regen:
  - "แผลสมานช้าๆ (+{heal})"
  - "เลือดอุ่นไหลกลับ — หายใจโล่งขึ้น (+{heal})"
status_tick_might:
  - "แรงในแขนยังเดือดอยู่"
status_tick_ward:
  - "ชั้นเกราะอ่อนยังเกาะผิว"
status_tick_focus:
  - "สมาธิยังนิ่ง — มานาซึมช้าๆ"
status_expire:
  - "「{status_name}」จางลง... หายใจโล่งขึ้นเล็กน้อย"
  - "สถานะ {status_name} สลายไป"

status_feel:
  poison: "คลื่นคลื่น เลือดอุ่นผิดปกติ"
  burn: "แสบร้อนเป็นระลอก"
  freeze: "แข็งทื่อ เคลื่อนไหวช้า"
  stun: "หูอื้อ จังหวะหลุด"
  shock: "กล้ามเนื้อกระตุก ฝีเท้าหลุด"
  default: "ความรู้สึกแปลกปลอมเกาะอยู่"

status_names:
  poison: พิษ
  burn: ไหม้
  freeze: แช่แข็ง
  stun: มึนงง
  shock: ช็อก

buff_blessing:
  - "พร/บัฟ「{buff}」ยังห่อหุ้มคุณ — ฝีเท้ามั่นขึ้น"
  - "แสงของ「{buff}」กระพริบที่ไหล่"
buff_party_call:
  - "「{name}」เข้าประจำแนว! พลังทีมดันขึ้นชั่วคราว"
  - "เสียง/เงาของ {name} อยู่ข้างคุณ — เรียกใช้สำเร็จ"
buff_expire:
  - "「{buff}」จางหาย... ร่างกายกลับสู่ปกติ"
debuff_pressure:
  - "ความกดดันทับอก — หายใจถี่"
low_hp_player:
  - "⚠ เลือดพร่อง ภาพเบลอ — ต้องตัดสินใจเร็ว"
  - "หัวใจเต้นในหู... HP เหลือน้อย"
low_hp_enemy:
  - "{enemy} สะบัดตัว ท่าทางเริ่มแตกพร่อง"
  - "คุณเห็นช่องว่าง — {enemy} อ่อนแรงลง"

party_assist:
  - "{name} พุ่งปิดช่องว่าง ฟัน/ยิงช่วย → {dmg}"
  - "จากด้านข้าง {name} ช่วยโจมตี ({dmg})"

flee_success:
  - "คุณหันหลัง ฝุ่นตลบ — หนีรอดจาก {enemy}!"
  - "หัวใจยังสั่น แต่ระยะห่างเปิดแล้ว"
flee_fail:
  - "หนีไม่พ้น! {enemy} ตัดทางไว้"
  - "เท้าสะดุด — ยังติดในวงรบ"

victory:
  - "{enemy} ทรุด... สนามเงียบลง เหลือแค่ลมหายใจคุณ"
  - "ชัยชนะ — เหงื่อเย็น และความโล่งอก"
victory_boss:
  - "ร่างใหญ่ของ {enemy} พังทลาย... เงาแห่งพื้นที่สั่นคลอน"
defeat:
  - "โลกมืดลง... เข่าทรุด ก่อนสติหลุด"
  - "แรงสุดท้ายหมด — คุณล้มลงต่อหน้า {enemy}"

mana_drain:
  - "มานาไหลออกตาม「{skill}」 (−{cost})"
combo_fusion:
  - "ธาตุหลอม! {flavor}"
  - "สนามเปลี่ยนสี: {flavor}"

potion_use:
  - "คุณกลืน/ใช้「{item}」 — รู้สึกถึงการฟื้นตัว"
  - "รสขม/อุ่นของ「{item}」แผ่ในลำคอ"

situation_stalemate:
  - "ทั้งสองฝ่ายรั้งระยะ — ฝุ่นยังไม่จาง"
situation_pressure:
  - "แรงกดจาก {enemy} หนักขึ้นทุกเทิร์น"
